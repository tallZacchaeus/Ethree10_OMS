name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  SSH_USER: root

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/ethree10_deploy_key
          chmod 600 ~/.ssh/ethree10_deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ethree10_deploy_key "${SSH_USER}@${{ secrets.VPS_HOST }}" "bash /srv/ethree10/deploy.sh"

      - name: Send failure email
        if: failure()
        run: |
          set -euo pipefail
          curl -sS -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @- <<'JSON'
          {
            "from": "Ethree10 Deploy <noreply@theincubatorhub.org>",
            "to": ["softdevs@theincubatorhub.org"],
            "subject": "Ethree10 VPS deploy failed",
            "html": "<p>The Ethree10 OMS GitHub Actions deployment failed. Check the latest workflow run in GitHub Actions.</p>"
          }
          JSON
