name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.4.0"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ethree10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ethree10/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oms
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/oms
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ethree10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ethree10/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ethree10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ethree10/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oms
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/oms
      - run: pnpm test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ethree10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oms
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/oms
      AUTH_SECRET: ci-test-secret-32-chars-long-enoughx
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_test_key
      EMAIL_FROM: noreply@test.com
      REDIS_URL: redis://localhost:6379
      INTEGRATION_SECRET_KEY: ${{ secrets.INTEGRATION_SECRET_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
      STORAGE_ENDPOINT: http://127.0.0.1:9000
      STORAGE_ACCESS_KEY: test-access-key
      STORAGE_SECRET_KEY: test-secret-key
      STORAGE_BUCKET: test-bucket
      STORAGE_PUBLIC_URL: http://localhost:3000/files
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STORAGE_URL: http://localhost:3000/files
      PLAYWRIGHT_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ethree10/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:generate
      - run: pnpm prisma migrate deploy
      - run: pnpm build
        env:
          CI: true
      - name: Start server
        run: pnpm start &
        env:
          PORT: 3000
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
      - run: pnpm test:e2e
        env:
          CI: true

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ethree10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oms
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/oms
      AUTH_SECRET: ci-test-secret-32-chars-long-enoughx
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_test_key
      EMAIL_FROM: noreply@test.com
      REDIS_URL: redis://localhost:6379
      INTEGRATION_SECRET_KEY: ${{ secrets.INTEGRATION_SECRET_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
      STORAGE_ENDPOINT: http://127.0.0.1:9000
      STORAGE_ACCESS_KEY: test-access-key
      STORAGE_SECRET_KEY: test-secret-key
      STORAGE_BUCKET: test-bucket
      STORAGE_PUBLIC_URL: http://localhost:3000/files
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STORAGE_URL: http://localhost:3000/files
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ethree10/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build

  readiness:
    name: Launch Readiness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ethree10
    env:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db.ethree10.com:5432/oms
      DIRECT_URL: postgresql://postgres:postgres@db.ethree10.com:5432/oms
      AUTH_SECRET: ci-readiness-secret-32-chars-long-enough
      AUTH_URL: https://oms.ethree10.com
      NEXTAUTH_URL: https://oms.ethree10.com
      RESEND_API_KEY: re_ci_test_key
      EMAIL_FROM: noreply@ethree10.com
      REDIS_URL: redis://redis.ethree10.com:6379
      INTEGRATION_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      STORAGE_ENDPOINT: https://storage.ethree10.com
      STORAGE_ACCESS_KEY: test-access-key
      STORAGE_SECRET_KEY: test-secret-key
      STORAGE_BUCKET: ethree10
      STORAGE_PUBLIC_URL: https://oms.ethree10.com/files
      NEXT_PUBLIC_APP_URL: https://oms.ethree10.com
      NEXT_PUBLIC_STORAGE_URL: https://oms.ethree10.com/files
      PAYSTACK_SECRET_KEY: sk_live_ci_placeholder
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_live_ci_placeholder
      NEXT_PUBLIC_POSTHOG_KEY: phc_ci_placeholder
      SENTRY_DSN: https://public@ingest.sentry.io/1
      NEXT_PUBLIC_SENTRY_DSN: https://public@ingest.sentry.io/1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ethree10/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:readiness
