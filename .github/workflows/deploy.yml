name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  SSH_USER: root

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Install SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/ethree10_deploy_key
          chmod 600 ~/.ssh/ethree10_deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ethree10_deploy_key "${SSH_USER}@${{ secrets.VPS_HOST }}" "bash /srv/ethree10/deploy.sh"

      - name: Send failure email
        if: failure()
        run: |
          curl -sS -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "Ethree10 Deploy <noreply@oms.ethree10.com>",
              "to": ["softdevs@theincubatorhub.org"],
              "subject": "Ethree10 VPS deploy failed",
              "html": "<h2>Deployment Failed</h2><p>A push to <strong>main</strong> triggered a deployment that failed.</p><p><a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View failed run →</a></p>"
            }'
